name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.os }}-${{ matrix.arch }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: darwin
            arch: arm64
            runner: macos-14
          - os: linux
            arch: x64
            runner: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p dist
          bun build src/index.ts --compile --outfile dist/notlabel

      - name: Package tarball
        run: |
          asset="notlabel-${{ matrix.os }}-${{ matrix.arch }}.tar.gz"
          tar -C dist -czf "$asset" notlabel
          shasum -a 256 "$asset" > "${asset}.sha256"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            notlabel-${{ matrix.os }}-${{ matrix.arch }}.tar.gz
            notlabel-${{ matrix.os }}-${{ matrix.arch }}.tar.gz.sha256

  publish:
    name: Publish release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare checksums
        run: |
          find artifacts -name "*.tar.gz.sha256" -type f -exec cat {} \; > checksums.txt

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/**/*.tar.gz
            checksums.txt
